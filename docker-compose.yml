# Production stack. Run: docker compose up --build -d
services:
  web:
    build:
      context: .
      target: production
    image: nfp-gold-history:prod
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
    env_file:
      - .env
